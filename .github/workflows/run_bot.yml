name: Run WorldCup Agent

on:
  schedule:
    - cron: '0 12 * * *'  # اجرا هر روز ساعت ۱۲ ظهر به وقت جهانی
  workflow_dispatch:      # قابلیت اجرای دستی

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python bot.py
        env:
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
